version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_eval
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: rag-eval-harness-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/rag_eval
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/rag_eval
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - redis

  worker:
    image: rag-eval-harness-worker:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/rag_eval
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/rag_eval
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - redis
    deploy:
      replicas: 1

volumes:
  postgres_data: